steps:
  # Step 1: Unit Tests - User Service
  - name: 'node:18-alpine'
    id: 'test-user-service'
    dir: 'services/user-service'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        npm install
        npm test || echo "No tests found, skipping..."

  # Step 2: Unit Tests - Product Service
  - name: 'node:18-alpine'
    id: 'test-product-service'
    dir: 'services/product-service'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        npm install
        npm test || echo "No tests found, skipping..."

  # Step 3: Unit Tests - Order Service
  - name: 'node:18-alpine'
    id: 'test-order-service'
    dir: 'services/order-service'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        npm install
        npm test || echo "No tests found, skipping..."

  # Step 4: Security Scan - User Service Image
  - name: 'aquasec/trivy:latest'
    id: 'trivy-scan-user'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        trivy fs --exit-code 0 \
          --severity HIGH,CRITICAL \
          --no-progress \
          services/user-service

  # Step 5: Security Scan - Product Service Image
  - name: 'aquasec/trivy:latest'
    id: 'trivy-scan-product'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        trivy fs --exit-code 0 \
          --severity HIGH,CRITICAL \
          --no-progress \
          services/product-service

  # Step 6: Security Scan - Order Service Image
  - name: 'aquasec/trivy:latest'
    id: 'trivy-scan-order'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        trivy fs --exit-code 0 \
          --severity HIGH,CRITICAL \
          --no-progress \
          services/order-service

  # Step 7: Build User Service Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-user-service'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/devsecops-repo/user-service:$SHORT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/devsecops-repo/user-service:latest'
      - 'services/user-service'

  # Step 8: Build Product Service Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-product-service'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/devsecops-repo/product-service:$SHORT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/devsecops-repo/product-service:latest'
      - 'services/product-service'

  # Step 9: Build Order Service Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-order-service'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/devsecops-repo/order-service:$SHORT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/devsecops-repo/order-service:latest'
      - 'services/order-service'

  # Step 10: Scan Built Images - Trivy
  - name: 'aquasec/trivy:latest'
    id: 'trivy-scan-images'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        trivy image --exit-code 0 \
          --severity HIGH,CRITICAL \
          --no-progress \
          us-central1-docker.pkg.dev/$PROJECT_ID/devsecops-repo/user-service:$SHORT_SHA

  # Step 11: Push Images
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-user-service'
    args: ['push', '--all-tags',
      'us-central1-docker.pkg.dev/$PROJECT_ID/devsecops-repo/user-service']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-product-service'
    args: ['push', '--all-tags',
      'us-central1-docker.pkg.dev/$PROJECT_ID/devsecops-repo/product-service']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-order-service'
    args: ['push', '--all-tags',
      'us-central1-docker.pkg.dev/$PROJECT_ID/devsecops-repo/order-service']

  # Step 12: Deploy to GKE
  - name: 'gcr.io/cloud-builders/kubectl'
    id: 'deploy-to-gke'
    args:
      - 'apply'
      - '-f'
      - 'k8s/'
      - '-R'
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=us-central1-a'
      - 'CLOUDSDK_CONTAINER_CLUSTER=dev-gke-cluster'

  # Step 13: Update Images in GKE
  - name: 'gcr.io/cloud-builders/kubectl'
    id: 'update-images'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        kubectl set image deployment/user-service \
          user-service=us-central1-docker.pkg.dev/$PROJECT_ID/devsecops-repo/user-service:$SHORT_SHA \
          -n devsecops
        kubectl set image deployment/product-service \
          product-service=us-central1-docker.pkg.dev/$PROJECT_ID/devsecops-repo/product-service:$SHORT_SHA \
          -n devsecops
        kubectl set image deployment/order-service \
          order-service=us-central1-docker.pkg.dev/$PROJECT_ID/devsecops-repo/order-service:$SHORT_SHA \
          -n devsecops
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=us-central1-a'
      - 'CLOUDSDK_CONTAINER_CLUSTER=dev-gke-cluster'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/devsecops-repo/user-service:$SHORT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/devsecops-repo/product-service:$SHORT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/devsecops-repo/order-service:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_MEDIUM'